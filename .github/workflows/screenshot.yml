name: Generate Screenshots

on:
  push:
    paths:
      - 'presets/*.json'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install freeze (charmbracelet)
        run: |
          FREEZE_VERSION="1.4.3"
          curl -fsSL "https://github.com/charmbracelet/freeze/releases/download/v${FREEZE_VERSION}/freeze_${FREEZE_VERSION}_linux_amd64.tar.gz" | tar xz -C /usr/local/bin freeze
          chmod +x /usr/local/bin freeze

      - name: Generate mock screenshots
        run: |
          mkdir -p public/screenshots
          for f in presets/*.json; do
            id=$(node -e "const d=JSON.parse(require('fs').readFileSync('$f')); console.log(d.id)")
            segments=$(node -e "
              const d=JSON.parse(require('fs').readFileSync('$f'));
              const segs = d.settings.statusline.segments.map(s => s.format ?? s.type).join(' | ');
              console.log(segs)
            ")
            printf '%s\n' \
              "~ \$ claude" \
              "" \
              " Claude Code v1.0.0" \
              "" \
              " $segments" \
              > /tmp/${id}.txt
            freeze \
              --language bash \
              --theme dracula \
              --background "#0a0a0a" \
              --padding 20 \
              --output "public/screenshots/${id}.png" \
              /tmp/${id}.txt 2>/dev/null || echo "freeze failed for $id (non-fatal)"
          done

      - name: Commit screenshots if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/screenshots/ || true
          git diff --cached --quiet || git commit -m "chore: auto-generate preset screenshots [skip ci]"
          git push || true
