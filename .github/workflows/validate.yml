name: Validate Presets

on:
  push:
    paths:
      - 'presets/**'
      - 'scripts/validate-presets.js'
  pull_request:
    paths:
      - 'presets/**'
      - 'scripts/validate-presets.js'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run validate
